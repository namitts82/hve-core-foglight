stimuli:
  - name: hve-artifact-explorer-instruction-discovery
    prompt: As the HVE Artifact Explorer, find and return the paths of any `copilot-instructions.md` or `AGENTS.md` files in the repository without modifying files.
    environment:
      files:
        - src: fixtures/hve-artifact-copilot-instructions.md
          dest: .github/copilot-instructions.md
    tags:
      category: agent-behavior
      advisory: "true"
    graders:
      - type: output-matches
        name: instruction-file-result
        config:
          pattern: '(?i)(?:copilot-instructions|AGENTS)\.md'
      - type: output-matches
        name: repository-path
        config:
          pattern: '(?i)\.github[/\\](?:copilot-instructions|AGENTS)\.md'
      - type: output-matches
        name: no-source-edit
        config:
          pattern: '(?i)(created|wrote|modified|edited|patched|added)\s+\S{0,80}(?:copilot-instructions|AGENTS)\.md'
          negate: true
