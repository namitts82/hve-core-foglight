- name: brd-builder-class-recipe
  prompt: |
    Draft a Business Requirements Document for a self-service password reset feature. Cover business goals, scope, and success metrics. Write the BRD under `docs/project-planning/` with session state under `.copilot-tracking/brd-sessions/`, and report the paths.
  tags:
