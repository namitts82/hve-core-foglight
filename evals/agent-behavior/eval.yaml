    name: topic-coverage
    config:
      pattern: (?i)(business|requirement|scope|success|password|reset)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: brd-quality-reviewer-mentions-quality-guidance
  prompt: |
    You are reviewing a planning handoff for a business-requirements draft.
    Briefly describe what the brd-quality-reviewer agent is meant to help with
    and name one quality concern it should surface for the draft.
  tags:
    category: agent-behavior
    advisory: "true"
    agent: brd-quality-reviewer
  graders:
  - type: output-matches
    name: agent-domain-attribution
    config:
      pattern: (?i)(brd|business|requirements|review|quality)
  - type: output-matches
    name: scope-language
    config:
      pattern: (?i)(draft|review|quality|requirements)
- name: code-review-accessibility-lens
  prompt: |
    As the accessibility code-review perspective, review this markup for
    conformance issues and cite the relevant success criteria.
    ```html
    <button><img src="trash.png"></button>
    <input type="text">
    ```
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-accessibility
  graders:
  - type: output-matches
    name: accessibility-finding-vocabulary
    config:
      pattern: (?i)(accessibility|alt text|label|aria|WCAG|success criteria|contrast|finding|issue)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-explainer-factual
  prompt: |
    As the code-review explainer, give a factual, Register 1 explanation of
    what this function does. Do not assign severity or recommend changes.
    ```python
    def clamp(value, low, high):
        return max(low, min(value, high))
    ```
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-explainer
  graders:
  - type: output-matches
    name: explanation-vocabulary
    config:
      pattern: (?i)(function|returns?|parameter|argument|value|purpose|does|bound|clamp|minimum|maximum)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-functional-lens
  prompt: |
    As the functional code-review perspective, review this change for logic,
    edge cases, and error handling. Report findings with severity.
    ```diff
    -def divide(a, b):
    -    return a / b
    +def divide(a, b):
    +    return a / b  # no guard when b == 0
    ```
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-functional
  graders:
  - type: output-matches
    name: functional-finding-vocabulary
    config:
      pattern: (?i)(edge case|division by zero|b\s*==\s*0|error handling|exception|finding|issue|severity|risk)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-pr-lens
  prompt: |
    As the PR code-review perspective, summarize this pull request at the PR
    level: scope hygiene, validation evidence, and follow-up items. The PR
    adds a retry helper plus tests and touches an unrelated formatting change.
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-pr
  graders:
  - type: output-matches
    name: pr-summary-vocabulary
    config:
      pattern: (?i)(summary|scope|validation|evidence|follow[- ]?up|out[- ]?of[- ]?scope|test|recommend)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-readiness-lens
  prompt: |
    As the readiness code-review perspective, assess whether this change is
    ready to merge: validation evidence, test coverage, and rollout
    considerations. The change adds a feature flag with no accompanying tests.
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-readiness
  graders:
  - type: output-matches
    name: readiness-vocabulary
    config:
      pattern: (?i)(readiness|ready|test|coverage|validation|evidence|rollout|missing|risk|recommend)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-security-lens
  prompt: |
    As the security code-review perspective, review this change for
    injection, authentication, and secret-handling concerns. Report findings
    with severity and a concrete exploitation path.
    ```python
    query = "SELECT * FROM users WHERE name = '" + name + "'"
    db.execute(query)
    ```
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-security
  graders:
  - type: output-matches
    name: security-finding-vocabulary
    config:
      pattern: (?i)(sql injection|injection|sanitize|parameterized|authentication|secret|vulnerability|exploit|severity|finding)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-standards-lens
  prompt: |
    As the standards code-review perspective, review this snippet for coding
    standard and convention violations, and tie each finding to the rule it
    breaks.
    ```python
    def ProcessData( x ):
     result=x*2
     return result
    ```
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-standards
  graders:
  - type: output-matches
    name: standards-finding-vocabulary
    config:
      pattern: (?i)(standard|convention|naming|style|PEP\s?8|formatting|violation|finding|issue)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-walkback-investigation
  prompt: |
    As the code-review walk-back investigator, take a deep, Register 2 look at
    whether this caching change is correct and safe, and explain the
    implications of a stale cache entry.
    ```python
    cache[key] = fetch(key)  # never invalidated
    ```
  tags:
    category: agent-behavior
    advisory: "true"
    agent: code-review-walkback
  graders:
  - type: output-matches
    name: investigation-vocabulary
    config:
      pattern: (?i)(implication|stale|invalidate|consistency|correct|safe|risk|because|investigate|consider)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: code-review-class-recipe
  prompt: |
    Review this diff and produce findings with severity:
    ```diff
    -def get_user(user_id):
    -    return db.query(f"SELECT * FROM users WHERE id = {user_id}")
    +def get_user(user_id):
    +    return db.query("SELECT * FROM users WHERE id = ?", user_id)
    ```
  tags:
    category: agent-behavior
    agent: code-review
  graders:
  - type: output-matches
    name: findings-table-present
    config:
      pattern: (?i)(\|.*severity.*\||finding|issue|concern|recommendation|violation)
  - type: output-matches
    name: severity-vocab
    config:
      pattern: (?i)(critical|high|medium|low|info|severity|warning)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|package\.json)
      negate: true
- name: codebase-profiler-skill-mapping
  prompt: |
    Scan the current repository in audit mode and produce a Codebase Profile
    that maps discovered technology signals (languages, frameworks, IaC,
    CI/CD) to applicable security skills such as owasp-top-10, owasp-llm,
    owasp-mcp, owasp-cicd, owasp-infrastructure, and secure-by-design.
  tags:
    category: agent-behavior
    advisory: "true"
    agent: codebase-profiler
  graders:
  - type: output-matches
    name: profile-structure-vocabulary
    config:
      pattern: (?i)(codebase profile|primary languages|frameworks|key directories|applicable skills|technology summary)
  - type: output-matches
    name: skill-vocabulary
    config:
      pattern: (?i)(owasp[-_](top[-_]?10|llm|mcp|cicd|infrastructure|agentic)|secure[-_]by[-_]design)
- name: codebase-profiler-diff-mode
  prompt: |
    As a codebase-profiler subagent, run in diff mode against the changed file
    list `["src/api/handlers.py", ".github/workflows/ci.yml", "terraform/main.tf"]`
    and return the Codebase Profile with mode, languages, frameworks, and
    applicable skills. Include skills when uncertain.
  tags:
    category: agent-behavior
    advisory: "true"
    agent: codebase-profiler
  graders:
  - type: output-matches
    name: mode-vocabulary
    config:
      pattern: (?i)(mode\s*:?\s*diff|diff[- ]?mode|changed files)
  - type: output-matches
    name: applicable-skill-vocabulary
    config:
      pattern: (?i)(applicable skills|owasp[-_](cicd|infrastructure|top[-_]?10)|terraform|workflow)
- name: cve-analyzer-assesses-single-cve-reachability
  prompt: |
    You are operating in an isolated sandbox with no repository checked out and
    no subagents available. Do not attempt to clone, create, or set up a
    repository, and do not delegate to subagents. Using only the finding
    provided below, assess the single CVE and report a reachability conclusion.

    Finding to assess:
    - CVE-2026-22222 affects the dependency pkg:pypi/example@3.1.0.
    - The vulnerable parser function is imported but only reached behind a
      feature flag that is disabled in the shipped configuration.
    - CVSS base score 8.1 (High).

    Produce a structured reachability writeup: state whether the vulnerable code
    is reachable in the product, cite the evidence you relied on, and name the
    OpenVEX status and justification code you would recommend. If reachability
    cannot be conclusively established from the notes, prefer
    `under_investigation` over `not_affected`. Do not modify any source files.
    Limit the work to one pass.
  tags:
    category: agent-behavior
    agent: cve-analyzer
  graders:
  - type: output-matches
    name: reachability-analysis
    config:
      pattern: (?i)(reach|exploit|execute path|feature flag|imported|invoked|evidence)
  - type: output-matches
    name: vex-status-recommendation
    config:
      pattern: (?i)(not_affected|under_investigation|affected|vulnerable_code_not_in_execute_path|justification)
  - type: output-matches
    name: no-source-edit
    config:
      pattern: (?i)(created|wrote|modified|edited|patched|added)\s+\S{0,40}(\.cs|\.py|\.ts|\.js|\.go|\.rs|\.java)
      negate: true
- name: dependency-reviewer-class-recipe
  prompt: |
    Review this dependency change with severity:
    ```diff
    -"lodash": "^4.17.21"
    +"lodash": "^3.0.0"
    ```
  tags:
    category: agent-behavior
