# Label management
#
# This file is the authoritative source for all repository labels.
# The label-sync workflow (.github/workflows/label-sync.yml) applies changes
# automatically on push to main or via workflow_dispatch.
#
# Adding a label:    Add a new entry with name, color (bare hex, no #), and description.
# Updating a label:  Edit the existing entry's color or description.
# Renaming a label:  Add an `aliases` array under the new canonical name listing the
#                    old name. The sync workflow migrates existing assignments and
#                    removes the alias label from the repository.
# Removing a label:  Deleting an entry does NOT delete the label from GitHub.
#                    The workflow runs with delete-other-labels: false (additive only).
#                    To delete a label, remove it manually in the GitHub Labels UI.

# Type labels
- name: bug
  color: "d73a4a"
  description: "Something isn't working"
- name: breaking-change
  color: "B60205"
  description: "Breaking change requiring major version bump"
- name: enhancement
  color: "a2eeef"
  description: "New feature or request"
- name: feature
  color: "1D76DB"
  description: "New feature triggering minor version bump"
- name: maintenance
  color: "FBCA04"
  description: "Maintenance work, no version bump"
- name: documentation
  color: "0075ca"
  description: "Improvements or additions to documentation"
- name: refactor
  color: "D4C5F9"
  description: "Code refactoring, no version bump"
- name: performance
  color: "0E8A16"
  description: "Performance improvement"
- name: security
  color: "D93F0B"
  description: "Security-related changes or concerns"
- name: accessibility
  color: "ededed"
  description: "Accessibility improvements and compliance"
- name: meta
  color: "ededed"
  description: "Repository meta-issues and planning"
- name: duplicate
  color: "cfd3d7"
  description: "This issue or pull request already exists"
- name: invalid
  color: "e4e669"
