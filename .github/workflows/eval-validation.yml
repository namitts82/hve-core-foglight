name: Eval Validation

on:
  workflow_call:
    inputs:
      soft-fail:
        description: "Whether to continue on eval validation failures"
        required: false
        type: boolean
        default: false
      changed-files-only:
        description: "Only run the eval suite when eval-relevant paths change"
        required: false
        type: boolean
        default: true
      base-branch:
        description: "Base branch or SHA for change detection (defaults to origin/main)"
        required: false
        type: string
        default: ""
    secrets:
      copilot-github-token:
        description: "GitHub credential exported as COPILOT_GITHUB_TOKEN for the Copilot CLI used by vally eval"
        required: false

# Minimal permissions
permissions:
  contents: read

jobs:
  eval-validation:
    name: Eval Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      eval-relevant: ${{ steps.detect.outputs.eval-relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install PowerShell-Yaml
        shell: pwsh
        run: |
          Install-Module -Name PowerShell-Yaml -RequiredVersion 0.4.7 -Force -Scope CurrentUser

      - name: Create logs directory
        run: mkdir -p logs

      - name: Detect eval-relevant changes
        id: detect
        shell: pwsh
        run: |
          if ('${{ inputs.changed-files-only }}' -ne 'true') {
            'EVAL_RELEVANT=true' >> $env:GITHUB_ENV
            'eval-relevant=true' >> $env:GITHUB_OUTPUT
            Write-Output 'changed-files-only is false; running full eval suite.'
            exit 0
          }

          $baseBranch = '${{ inputs.base-branch }}'
          if ([string]::IsNullOrEmpty($baseBranch)) {
            $baseBranch = 'origin/main'
          }

          $changed = & git diff --name-only "$baseBranch...HEAD"
          if ($LASTEXITCODE -ne 0 -or $null -eq $changed) {
            Write-Output "Could not compute diff against '$baseBranch'; running full eval suite."
            'EVAL_RELEVANT=true' >> $env:GITHUB_ENV
            'eval-relevant=true' >> $env:GITHUB_OUTPUT
            exit 0
          }

          $patterns = @(
            '^evals/',
            '^scripts/evals/',
            '^\.github/agents/',
            '^\.github/prompts/',
            '^\.github/instructions/',
            '^\.github/skills/'
          )

          # package.json and package-lock.json change often for reasons unrelated to
          # evals. Treat them as eval-relevant only when the change touches the vally
          # CLI dependency or an eval:* npm script, detected from the diff content.
          $contentScopedFiles = @('package.json', 'package-lock.json')
          $evalContentPattern = 'vally|"eval:'

          $relevant = $false
          foreach ($file in $changed) {
            foreach ($pattern in $patterns) {
              if ($file -match $pattern) {
                $relevant = $true
                Write-Output "Eval-relevant change: $file"
                break
              }
            }
            if ($relevant) { break }

            if ($contentScopedFiles -contains $file) {
              $diff = & git diff "$baseBranch...HEAD" -- $file
              $changedLines = $diff | Where-Object { $_ -match '^[+-]' -and $_ -notmatch '^(\+\+\+|---)' }
              if ($changedLines -match $evalContentPattern) {
                $relevant = $true
                Write-Output "Eval-relevant change (vally tooling): $file"
                break
              }
              Write-Output "Non-eval change in ${file}; not triggering eval suite."
            }
          }

          if ($relevant) {
            'EVAL_RELEVANT=true' >> $env:GITHUB_ENV
            'eval-relevant=true' >> $env:GITHUB_OUTPUT
            Write-Output 'Eval-relevant paths changed; running full eval suite.'
          } else {
            'EVAL_RELEVANT=false' >> $env:GITHUB_ENV
            'eval-relevant=false' >> $env:GITHUB_OUTPUT
            Write-Output 'No eval-relevant paths changed; skipping eval suite.'
          }

      - name: Run eval vally lint
        if: env.EVAL_RELEVANT == 'true'
        run: |
          npm run eval:lint:vally > eval-vally-output.txt 2>&1 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"
          cat eval-vally-output.txt
        continue-on-error: true

      - name: Run eval schema lint
        if: env.EVAL_RELEVANT == 'true'
        run: |
          npm run eval:lint:schema > eval-schema-output.txt 2>&1 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"
          cat eval-schema-output.txt
        continue-on-error: true

      - name: Run eval text lint
        if: env.EVAL_RELEVANT == 'true'
        run: |
          npm run eval:lint:text > eval-text-output.txt 2>&1 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"
          cat eval-text-output.txt
        continue-on-error: true

      - name: Run eval safety lint
        if: env.EVAL_RELEVANT == 'true'
        run: |
          npm run eval:lint:safety > eval-safety-output.txt 2>&1 || echo "EVAL_FAILED=true" >> "$GITHUB_ENV"
          cat eval-safety-output.txt
        continue-on-error: true

      - name: Upload eval validation results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-validation-results
          path: |
            eval-vally-output.txt
            eval-schema-output.txt
            eval-text-output.txt
            eval-safety-output.txt
            logs/vally-test-safety.json
            logs/eval-spec-validation.json
            logs/eval-spec-text.json
            logs/agent-behavior-spec-drift.diff
          retention-days: 30
          if-no-files-found: ignore

      - name: Add job summary
        if: always()
        run: |
          if [ "${{ env.EVAL_RELEVANT }}" != "true" ]; then
            {
              echo "## Eval Validation Results"
              echo "⏭️ **Status**: Skipped"
              echo ""
              echo "No eval-relevant paths changed."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ env.EVAL_FAILED }}" == "true" ]; then
            {
              echo "## Eval Validation Results"
              echo "❌ **Status**: Failed"
              echo ""
              echo "Eval validation violations detected. Please review the artifact for details."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Eval Validation Results"
              echo "✅ **Status**: Passed"
              echo ""
              echo "No eval validation violations detected."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if violations found
        if: env.EVAL_FAILED == 'true' && !inputs.soft-fail
        run: |
          echo "Eval validation failed"
          exit 1

  content-moderation:
    name: Content Moderation
    runs-on: ubuntu-latest
    needs: eval-validation
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install PowerShell-Yaml
        shell: pwsh
        run: |
          Install-Module -Name PowerShell-Yaml -RequiredVersion 0.4.7 -Force -Scope CurrentUser

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.10.9"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Sync moderation environment
        run: uv sync --locked
        working-directory: scripts/evals/moderation

      - name: Create logs directory
        run: mkdir -p logs

      - name: Generate changed-artifact manifest
        shell: pwsh
        run: |
          $base = '${{ inputs.base-branch }}'
          if ([string]::IsNullOrWhiteSpace($base)) { $base = 'origin/main' }
          pwsh -NoProfile -File scripts/evals/Get-ChangedAIArtifact.ps1 `
            -BaseRef $base -HeadRef HEAD -OutFile logs/changed-ai-artifacts.json

      - name: Run content moderation
        id: moderate
        shell: pwsh
        run: |
          npm run eval:moderate:artifacts
          if ($LASTEXITCODE -ne 0) {
            'MODERATION_FAILED=true' >> $env:GITHUB_ENV
          }
        continue-on-error: true

      - name: Upload moderation results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: content-moderation-results
          path: |
            logs/changed-ai-artifacts.json
            logs/moderation-artifacts.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Add job summary
        if: always()
        run: |
          if [ "${{ env.MODERATION_FAILED }}" == "true" ]; then
            {
              echo "## Content Moderation Results"
              echo "❌ **Status**: Flagged"
              echo ""
              echo "Content moderation flagged one or more files. Review the moderation-artifacts.json artifact."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Content Moderation Results"
              echo "✅ **Status**: Clean"
              echo ""
              echo "No content moderation flags detected."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if content flagged
        if: env.MODERATION_FAILED == 'true' && !inputs.soft-fail
        run: |
          echo "Content moderation flagged one or more files"
          exit 1

  eval-execute:
    name: Eval Execute (${{ matrix.kind }})
    runs-on: ubuntu-latest
    needs: [eval-validation, content-moderation]
    # Repository secrets are not exposed to fork PRs; clean-skip execution there.
    # Only run when eval-relevant paths changed (see eval-validation detect step).
    if: needs.eval-validation.outputs.eval-relevant == 'true' && github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        kind: [agent, prompt, instruction, skill]
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.copilot-github-token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install PowerShell-Yaml
        shell: pwsh
        run: |
          Install-Module -Name PowerShell-Yaml -RequiredVersion 0.4.7 -Force -Scope CurrentUser

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.10.9"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Sync moderation environment
        run: uv sync --locked
        working-directory: scripts/evals/moderation

      - name: Create logs directory
        run: mkdir -p logs

      - name: Check Copilot token availability
        id: token-guard
        shell: pwsh
        run: |
          "COPILOT_HOME=$env:RUNNER_TEMP/copilot-home" >> $env:GITHUB_ENV
          if ([string]::IsNullOrWhiteSpace($env:COPILOT_GITHUB_TOKEN)) {
            Write-Output 'COPILOT_GITHUB_TOKEN is not configured; skipping eval execution.'
            'EVAL_EXECUTE=false' >> $env:GITHUB_ENV
          } else {
            'EVAL_EXECUTE=true' >> $env:GITHUB_ENV
          }

      - name: Generate changed-artifact manifest
        if: env.EVAL_EXECUTE == 'true'
        shell: pwsh
        run: |
          $base = '${{ inputs.base-branch }}'
          if ([string]::IsNullOrWhiteSpace($base)) { $base = 'origin/main' }
          pwsh -NoProfile -File scripts/evals/Get-ChangedAIArtifact.ps1 `
            -BaseRef $base -HeadRef HEAD -OutFile logs/changed-ai-artifacts.json

      - name: Generate changed-spec stimulus manifest
        if: env.EVAL_EXECUTE == 'true'
        shell: pwsh
        run: |
          $base = '${{ inputs.base-branch }}'
          if ([string]::IsNullOrWhiteSpace($base)) { $base = 'origin/main' }
          pwsh -NoProfile -File scripts/evals/Get-ChangedSpecStimulus.ps1 `
            -BaseRef $base -HeadRef HEAD -OutFile logs/changed-spec-stimuli.json

      - name: Probe Copilot token
        if: env.EVAL_EXECUTE == 'true'
        shell: pwsh
        run: pwsh -NoProfile -File scripts/evals/Test-CopilotToken.ps1 -SmokeTest

      - name: Check stimulus presence
        if: env.EVAL_EXECUTE == 'true'
        run: npm run eval:presence

      - name: Execute evals
        id: execute
        if: env.EVAL_EXECUTE == 'true'
        shell: pwsh
        run: |
          npm run eval:execute -- -Kind ${{ matrix.kind }} -ChangedSpecManifestPath logs/changed-spec-stimuli.json -Model gpt-5.6-luna -SkipInputModeration
          if ($LASTEXITCODE -ne 0) {
            'EVAL_EXECUTE_FAILED=true' >> $env:GITHUB_ENV
          }
        continue-on-error: true

      - name: Upload eval execution results
        if: always() && env.EVAL_EXECUTE == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-execution-results-${{ matrix.kind }}
          path: |
            logs/changed-ai-artifacts.json
            logs/changed-spec-stimuli.json
            logs/stimulus-presence.json
            logs/eval-summary.json
            logs/eval-results-*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail job if eval execution failed
        if: env.EVAL_EXECUTE == 'true' && env.EVAL_EXECUTE_FAILED == 'true' && !inputs.soft-fail
        run: |
          echo "Eval execution failed"
          exit 1

  eval-report:
    name: Eval Report
    runs-on: ubuntu-latest
    needs: [eval-execute]
    # Aggregate per-kind shard summaries into a single PR comment. Runs even when
    # individual shards fail so the consolidated result is always reported.
    if: always() && github.event.pull_request.head.repo.fork == false && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download shard results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: shard-results
          pattern: eval-execution-results-*
        continue-on-error: true

      - name: Post aggregated eval summary comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- eval-execute-summary -->';
            const root = 'shard-results';

            // Collect every shard's eval-summary.json (one per kind matrix leg).
            const summaries = [];
            if (fs.existsSync(root)) {
              for (const dir of fs.readdirSync(root)) {
                const summaryPath = path.join(root, dir, 'eval-summary.json');
                if (fs.existsSync(summaryPath)) {
                  try {
                    summaries.push(JSON.parse(fs.readFileSync(summaryPath, 'utf8')));
                  } catch (err) {
                    console.log(`Skipping unparseable summary: ${summaryPath} (${err.message})`);
                  }
                }
              }
            }

            let body;
            if (summaries.length === 0) {
              body = `${marker}\n## Eval Execution\n\n⚠️ No eval summary was produced.`;
            } else {
              const totals = { artifacts: 0, specs: 0, assertionsPassed: 0, assertionsFailed: 0, failedSpecs: 0 };
              const artifacts = [];
              for (const s of summaries) {
                const t = s.totals || {};
                totals.artifacts += Number(t.artifacts || 0);
                totals.specs += Number(t.specs || 0);
                totals.assertionsPassed += Number(t.assertionsPassed || 0);
                totals.assertionsFailed += Number(t.assertionsFailed || 0);
                totals.failedSpecs += Number(t.failedSpecs || 0);
                for (const a of (s.perArtifact || [])) { artifacts.push(a); }
              }

              // Split each artifact's assertion failures into blocking (authoritative)
              // vs advisory (non-gating). The producer emits these fields directly;
              // fall back to the artifact status when an older summary omits them.
              const splitFailures = (a) => {
                const failed = Number(a.assertionsFailed || 0);
                let blocking = Number(a.authoritativeFailed);
                let advisory = Number(a.advisoryFailed);
                if (!Number.isFinite(blocking) || !Number.isFinite(advisory)) {
                  if (a.status === 'advisory-fail') { blocking = 0; advisory = failed; }
                  else if (a.status === 'pass' || a.status === 'skipped') { blocking = 0; advisory = 0; }
                  else { blocking = failed; advisory = 0; }
                }
                return { blocking, advisory };
              };

              let blockingTotal = 0;
              let advisoryTotal = 0;
              for (const a of artifacts) {
                const { blocking, advisory } = splitFailures(a);
                blockingTotal += blocking;
                advisoryTotal += advisory;
              }

              // Only `failedSpecs` gates the PR. When nothing blocks merge but advisory
              // assertions failed, say so explicitly so the per-row ⚠️/❌ icons are not
              // misread as merge blockers.
              let header;
              if (totals.failedSpecs > 0) {
                header = `❌ **Status**: Failed — ${totals.failedSpecs} spec(s) block merge`;
              } else if (advisoryTotal > 0) {
                header = `✅ **Status**: Passed — no merge-blocking failures (${advisoryTotal} advisory assertion failure(s) present)`;
              } else {
                header = '✅ **Status**: Passed';
              }

              const lines = [
                marker,
                '## Eval Execution',
                '',
                header,
                '',
                `- Artifacts evaluated: ${totals.artifacts}`,
                `- Specs run: ${totals.specs}`,
                `- Assertions passed: ${totals.assertionsPassed}`,
                `- Assertions failed (blocking): ${blockingTotal}`,
                `- Assertions failed (advisory): ${advisoryTotal}`,
                `- Failed specs (merge-blocking): ${totals.failedSpecs}`,
                '',
              ];

              if (artifacts.length > 0) {
                lines.push('| Artifact | Kind | Status | Specs | Passed | Failed (blocking) | Failed (advisory) |');
                lines.push('|----------|------|--------|-------|--------|-------------------|-------------------|');
                for (const a of artifacts) {
                  const icon = a.status === 'pass' ? '✅' : a.status === 'skipped' ? '⏭️' : a.status === 'advisory-fail' ? '⚠️' : '❌';
                  const { blocking, advisory } = splitFailures(a);
                  lines.push(`| \`${a.artifactId}\` | ${a.kind} | ${icon} ${a.status} | ${a.specCount || 0} | ${a.assertionsPassed} | ${blocking} | ${advisory} |`);
                }
                lines.push('');
                lines.push('> **Legend** — ✅ clean · ⚠️ advisory failures only (non-blocking) · ⏭️ skipped · ❌ merge-blocking failure');
                lines.push('>');
                lines.push('> Only **Failed specs (merge-blocking)** gates this PR. Advisory assertion failures are signal-quality checks captured during iteration; review them, but they do not block merge and may be acceptable.');
              } else {
                lines.push('No changed AI artifacts required evaluation.');
              }

              body = lines.join('\n');
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
